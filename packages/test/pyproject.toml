[project]
name = "magicc"
version = "0.1.0"
description = "Magic Coder - AI-powered code assistant family"
readme = "README.md"
requires-python = ">=3.10"
authors = [
    {name = "wxd123", email = "wxd123@users.noreply.github.com"},
]
license = "MIT"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.workspace]
members = [
    "packages/*",
    "shared",
]

[tool.uv.sources]
magicc-shared = { path = "shared", editable = true }
magicc-comment = { path = "packages/comment", editable = true }
magicc-code = { path = "packages/code", editable = true }
magicc-arch = { path = "packages/arch", editable = true }
magicc-test = { path = "packages/test", editable = true }
magicc-report = { path = "packages/report", editable = true }

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "SIM"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
strict_optional = true

[tool.pytest.ini_options]
testpaths = ["tests", "packages/*/tests", "shared/tests"]
addopts = "-v --cov=magicc --cov-report=html"
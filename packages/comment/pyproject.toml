[project]
name = "magicc-comment"
version = "0.1.0"
description = "Magic Comment - AI-powered code comment assistant"
readme = "README.md"
requires-python = ">=3.10"
authors = [
    {name = "wxd123", email = "wxd123@users.noreply.github.com"},
]
license = "MIT"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"


[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "SIM"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
strict_optional = true

[tool.pytest.ini_options]
testpaths = ["tests", "packages/*/tests", "shared/tests"]
addopts = "-v --cov=magicc --cov-report=html"